<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Light Guide - 次世代交通ナビ</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.gridlayer.googlemutant@latest/dist/Leaflet.GoogleMutant.js"></script>

    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0b0f19; color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; display: flex; flex-direction: column; height: 100vh;
        }
        .hud-mode { transform: scaleX(-1); }

        /* 【レスポンシブ】上部インフォメーションパネル */
        header {
            padding: 15px; background: rgba(11, 15, 25, 0.9);
            border-bottom: 1px solid rgba(255, 215, 0, 0.3); z-index: 1000;
        }
        .info-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* スマホでは2列 */
            gap: 10px; 
            text-align: center; 
            max-width: 1200px; 
            margin: 0 auto; width: 100%;
        }
        .info-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; }
        .info-label { font-size: 0.75rem; color: #aaa; margin-bottom: 2px; }
        .info-value { font-size: 1.1rem; font-weight: bold; color: #00ffcc; }
        .highlight { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }

        /* メインエリア */
        #main-container { flex-grow: 1; position: relative; width: 100%; }
        #map { width: 100%; height: 100%; z-index: 1; }

        /* 地図の上に重なる光のガイド */
        #light-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; display: flex; justify-content: center; align-items: center;
        }
        .light-stream {
            width: 85%; height: 12px;
            background: linear-gradient(90deg, transparent, #ffd700, #ffffff, #ffd700, transparent);
            background-size: 200% 100%; border-radius: 6px;
            box-shadow: 0 0 30px #ffd700, 0 0 10px #ffd700;
            animation: moveLight 1.5s infinite linear; display: none;
        }
        @keyframes moveLight {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 観光地ポップアップ通知 */
        #spot-banner {
            position: absolute; top: 20px; left: 5%; width: 90%;
            background: rgba(0, 204, 204, 0.95); color: #000; padding: 10px;
            border-radius: 10px; font-weight: bold; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100;
            display: none; animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* 下部操作ボタン */
        footer {
            padding: 20px; display: flex; gap: 15px;
            background: rgba(11, 15, 25, 0.9); z-index: 1000;
            justify-content: center;
        }
        .btn-container {
            display: flex; gap: 15px; width: 100%; max-width: 600px; /* パソコンでも広がりすぎないように */
        }
        button {
            flex: 1; padding: 15px; border: none; border-radius: 30px;
            font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background-color: #ffd700; color: #000; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .btn-secondary { background-color: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        button:active { transform: scale(0.95); }

        /* 📱 【レスポンシブ】タブレット・パソコン用のスタイル調整（画面幅が768px以上の場合） */
        @media (min-width: 768px) {
            .info-grid { grid-template-columns: 1fr 1fr 1fr 1fr; } /* 横並びを4列にして広々見せる */
            .info-box { padding: 15px; }
            .info-value { font-size: 1.3rem; }
            button { font-size: 1.1rem; padding: 18px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="info-grid">
            <div class="info-box">
                <div class="info-label">前方渋滞状況</div>
                <div id="traffic-status" class="info-value" style="color: #00ffcc;">順調 (0分遅れ)</div>
            </div>
            <div class="info-box">
                <div class="info-label">おすすめルート</div>
                <div id="time-saved" class="info-value highlight">---</div>
            </div>
            <div class="info-box">
                <div class="info-label">現在地</div>
                <div id="geo-status" class="info-value" style="color: #aaa; font-size: 0.9rem;">測位中...</div>
            </div>
            <div class="info-box">
                <div class="info-label">システム状態</div>
                <div class="info-value" style="color: #00ffcc;">ONLINE</div>
            </div>
        </div>
    </header>

    <div id="main-container">
        <div id="spot-banner">近くの観光名所：🌟歴史ある城下町エリア</div>
        <div id="map"></div>
        <div id="light-overlay">
            <div id="light-bar" class="light-stream"></div>
        </div>
    </div>

    <footer>
        <div class="btn-container">
            <button class="btn-secondary" onclick="toggleHUD()">HUD投影</button>
            <button class="btn-primary" onclick="triggerJamSimulation()">渋滞・迂回デモ</button>
        </div>
    </footer>

    <script>
        let map;
        let marker;

        window.onload = function() {
            // 地図の初期化（最初は東京駅周辺）
            map = L.map('map', { zoomControl: false }).setView([35.681236, 139.767125], 15);
            
            // 🗺️ Googleマップのデータを読み込んで背景にセット（通常の道路マップ）
            L.gridLayer.googleMutant({
                type: 'roadmap' 
            }).addTo(map);

            // GPSの取得開始
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updateLocation, handleGPSError, {
                    enableHighAccuracy: true,
                    timeout: 5000
                });
            } else {
                document.getElementById('geo-status').innerText = "GPS非対応";
            }
        };

        function updateLocation(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const currentPos = [lat, lng];

            // 上部のパネルに緯度・経度を表示
            document.getElementById('geo-status').innerText = `${lat.toFixed(3)}, ${lng.toFixed(3)}`;

            if (!marker) {
                // 現在地を示す青いピンを作成
                marker = L.circleMarker(currentPos, { color: '#007bff', radius: 8, fillColor: '#00ffcc', fillOpacity: 0.9 }).addTo(map);
            } else {
                marker.setLatLng(currentPos);
            }
            map.setView(currentPos, 16); 
        }

        function handleGPSError(error) {
            console.warn("GPS待ち: " + error.message);
        }

        function toggleHUD() {
            document.body.classList.toggle('hud-mode');
        }

        function triggerJamSimulation() {
            document.getElementById('traffic-status').innerHTML = "<span style='color: #ff3366;'>激しい渋滞 (15分遅れ)</span>";
            document.getElementById('time-saved').innerHTML = "光の道で <span style='font-size:1.3rem;'>12分短縮</span>";
            document.getElementById('light-bar').style.display = 'block';
            document.getElementById('spot-banner').style.display = 'block';

            if (navigator.vibrate) {
                navigator.vibrate([300, 150, 300]);
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('PWA Ready'))
                .catch(err => console.error(err));
        }
    </script>
</body>
</html>
